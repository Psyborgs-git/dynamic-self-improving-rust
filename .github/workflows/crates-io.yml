name: crates.io

on:
  workflow_dispatch:
  # Also publish on main when crate manifests or this workflow change.
  # Existing versions are skipped; needed because cloud agents cannot
  # workflow_dispatch with the installation token.
  push:
    branches: [main]
    paths:
      - 'crates/**/Cargo.toml'
      - '.github/workflows/crates-io.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      # Order: psy-facet leafs → psy-baml leafs → mid-tier → bamltype → dsir
      - name: publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          wait_for_index() {
            local crate="$1"
            local version="$2"
            local attempts=60
            local i=1
            echo "Waiting for ${crate}@${version} to appear on crates.io index..."
            while [ "$i" -le "$attempts" ]; do
              if cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1; then
                echo "Indexed: ${crate}@${version}"
                return 0
              fi
              echo "  attempt ${i}/${attempts}: not visible yet; sleeping 10s"
              sleep 10
              i=$((i + 1))
            done
            echo "::error::Timed out waiting for ${crate}@${version} on crates.io index"
            return 1
          }

          publish_with_retry() {
            local crate="$1"
            local attempt=1
            local max_attempts=20
            local log
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Publish attempt ${attempt}/${max_attempts} for ${crate}..."
              set +e
              log="$(cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1)"
              local status=$?
              set -e
              echo "$log"
              if [ "$status" -eq 0 ]; then
                return 0
              fi
              if echo "$log" | grep -q '429 Too Many Requests'; then
                # Prefer the server's retry-after timestamp when present.
                local until
                until="$(echo "$log" | sed -n 's/.*try again after \([A-Za-z0-9,: ]*GMT\).*/\1/p' | head -1)"
                if [ -n "$until" ]; then
                  local now_epoch until_epoch sleep_s
                  now_epoch="$(date -u +%s)"
                  until_epoch="$(date -u -d "$until" +%s 2>/dev/null || echo 0)"
                  if [ "$until_epoch" -gt "$now_epoch" ]; then
                    sleep_s=$((until_epoch - now_epoch + 15))
                  else
                    sleep_s=120
                  fi
                else
                  sleep_s=300
                fi
                echo "::warning::Rate limited publishing ${crate}; sleeping ${sleep_s}s then retrying"
                sleep "$sleep_s"
                attempt=$((attempt + 1))
                continue
              fi
              echo "::error::cargo publish failed for ${crate}"
              return "$status"
            done
            echo "::error::Exhausted retries publishing ${crate}"
            return 1
          }

          crates=(
            psy-facet-macro-types
            psy-facet-macro-parse
            psy-facet-macros-impl
            psy-facet-macros
            psy-facet-core
            psy-facet-path
            psy-facet-reflect
            psy-facet
            psy-baml-ids
            psy-bstd
            psy-internal-baml-diagnostics
            psy-baml-types
            psy-internal-baml-jinja
            psy-jsonish
            bamltype-derive
            bamltype
            dsir-macros
            dsir
          )
          for crate in "${crates[@]}"; do
            version="$(cargo pkgid -p "$crate" | sed -E 's|.*#||')"
            if cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1; then
              echo "::notice::Skipping ${crate} publish because version ${version} already exists."
            else
              echo "Publishing ${crate}@${version}..."
              publish_with_retry "$crate"
              wait_for_index "$crate" "$version"
              # New-crate burst limit is tight; pace remaining first-time publishes.
              echo "Pacing 90s before next new crate publish..."
              sleep 90
            fi
          done
