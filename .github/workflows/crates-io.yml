name: crates.io

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      # ponytail: dependency order matters. Add or reorder crates here as the workspace changes.
      - run: cargo publish -p dsir-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p dsir --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
