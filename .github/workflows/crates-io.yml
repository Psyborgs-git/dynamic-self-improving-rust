name: crates.io

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      # Order: psy-facet leafs → psy-baml leafs → mid-tier → bamltype → dsir
      - name: publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          wait_for_index() {
            local crate="$1"
            local version="$2"
            local attempts=60
            local i=1
            echo "Waiting for ${crate}@${version} to appear on crates.io index..."
            while [ "$i" -le "$attempts" ]; do
              if cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1; then
                echo "Indexed: ${crate}@${version}"
                return 0
              fi
              echo "  attempt ${i}/${attempts}: not visible yet; sleeping 10s"
              sleep 10
              i=$((i + 1))
            done
            echo "::error::Timed out waiting for ${crate}@${version} on crates.io index"
            return 1
          }

          crates=(
            psy-facet-macro-types
            psy-facet-macro-parse
            psy-facet-macros-impl
            psy-facet-macros
            psy-facet-core
            psy-facet-path
            psy-facet-reflect
            psy-facet
            psy-baml-ids
            psy-bstd
            psy-internal-baml-diagnostics
            psy-baml-types
            psy-internal-baml-jinja
            psy-jsonish
            bamltype-derive
            bamltype
            dsir-macros
            dsir
          )
          for crate in "${crates[@]}"; do
            version="$(cargo pkgid -p "$crate" | sed -E 's|.*#||')"
            if cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1; then
              echo "::notice::Skipping ${crate} publish because version ${version} already exists."
            else
              echo "Publishing ${crate}@${version}..."
              cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
              wait_for_index "$crate" "$version"
            fi
          done
